spring.application.name=detox-agent

server.port=${SERVER_PORT:8080}

# PostgreSQL (persistent storage)
spring.r2dbc.url=r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:2157}/${DB_NAME:detox_analytics}
spring.r2dbc.username=${DB_USERNAME:detox}
spring.r2dbc.password=${DB_PASSWORD:detox}
spring.sql.init.mode=always

# Redis (real-time cache)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Spring gRPC server
spring.grpc.server.port=${GRPC_SERVER_PORT:50051}

# AI agent gRPC client (token stream source)
ai.agent.grpc.host=${AI_AGENT_HOST:localhost}
ai.agent.grpc.port=${AI_AGENT_PORT:50052}
ai.agent.grpc.use-plaintext=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.reactive.media-types=text/html

# Swagger UI / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
jwt.secret=${JWT_SECRET:detox-agent-very-secure-jwt-secret-key-must-be-at-least-32-bytes!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# DoH fallback
doh.fallback-base-url=${DOH_FALLBACK_URL:https://doh.leeswallow.click}
